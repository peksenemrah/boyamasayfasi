<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <style>
    [data-region] { cursor: pointer; transition: opacity 0.1s; }
    [data-region]:hover { opacity: 0.8; }
  </style>

  <!-- Fuselage (main body) -->
  <path data-region="1" d="M60,185 Q60,165 90,160 L310,160 Q360,162 370,185 Q360,210 310,215 L90,215 Q60,210 60,185 Z" fill="white" stroke="#1a1a1a" stroke-width="2.5"/>

