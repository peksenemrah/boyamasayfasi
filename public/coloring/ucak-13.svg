  <!-- Window 1 -->
  <ellipse data-region="8" cx="305" cy="185" rx="16" ry="13" fill="white" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Window 2 -->
  <ellipse data-region="9" cx="268" cy="185" rx="16" ry="13" fill="white" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Window 3 -->
  <ellipse data-region="10" cx="231" cy="185" rx="16" ry="13" fill="white" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Engine pod on left wing -->
  <path data-region="11" d="M145,232 Q138,238 135,250 Q140,258 165,255 Q180,252 178,242 Q175,232 162,228 Z" fill="white" stroke="#1a1a1a" stroke-width="2"/>

