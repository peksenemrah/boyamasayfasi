  <!-- Right main wing (top) -->
  <path data-region="4" d="M200,160 Q195,135 140,85 Q115,63 95,70 Q100,95 130,117 Q158,138 180,160 Z" fill="white" stroke="#1a1a1a" stroke-width="2.5"/>

