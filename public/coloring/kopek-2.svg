<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <style>
    [data-region] { cursor: pointer; transition: opacity 0.1s; }
    [data-region]:hover { opacity: 0.8; }
  </style>

  <!-- Body -->
  <ellipse data-region="1" cx="200" cy="295" rx="105" ry="80" fill="white" stroke="#1a1a1a" stroke-width="2.5"/>

  <!-- Head -->
  <ellipse data-region="2" cx="200" cy="175" rx="95" ry="85" fill="white" stroke="#1a1a1a" stroke-width="2.5"/>

  <!-- Left floppy ear -->
  <path data-region="3" d="M115,150 Q80,140 75,195 Q72,240 110,250 Q130,255 140,225 Q148,200 130,175 Z" fill="white" stroke="#1a1a1a" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Right floppy ear -->
  <path data-region="4" d="M285,150 Q320,140 325,195 Q328,240 290,250 Q270,255 260,225 Q252,200 270,175 Z" fill="white" stroke="#1a1a1a" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Left eye -->
  <ellipse data-region="5" cx="167" cy="165" rx="20" ry="20" fill="white" stroke="#1a1a1a" stroke-width="2.5"/>

  <!-- Left pupil -->
  <circle data-region="6" cx="167" cy="165" r="10" fill="white" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Right eye -->
  <ellipse data-region="7" cx="233" cy="165" rx="20" ry="20" fill="white" stroke="#1a1a1a" stroke-width="2.5"/>

  <!-- Right pupil -->
  <circle data-region="8" cx="233" cy="165" r="10" fill="white" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Snout -->
  <ellipse data-region="9" cx="200" cy="210" rx="45" ry="32" fill="white" stroke="#1a1a1a" stroke-width="2.5"/>

  <!-- Nose -->
  <ellipse data-region="10" cx="200" cy="200" rx="18" ry="12" fill="white" stroke="#1a1a1a" stroke-width="2.5"/>

  <!-- Tongue -->
  <path data-region="11" d="M185,225 Q185,255 200,260 Q215,255 215,225 Z" fill="white" stroke="#1a1a1a" stroke-width="2.5"/>
  <line x1="200" y1="228" x2="200" y2="258" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Tail -->
  <path data-region="12" d="M300,280 Q355,250 370,210 Q380,180 360,168 Q345,158 340,178 Q338,195 325,215 Q310,240 295,270 Z" fill="white" stroke="#1a1a1a" stroke-width="2.5"/>

  <!-- Belly patch -->
  <ellipse data-region="13" cx="200" cy="300" rx="55" ry="40" fill="white" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Left front leg -->
  <path data-region="14" d="M145,355 Q130,360 128,375 Q135,385 155,383 Q168,380 165,365 Q162,353 150,348 Z" fill="white" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Right front leg -->
  <path data-region="15" d="M255,355 Q270,360 272,375 Q265,385 245,383 Q232,380 235,365 Q238,353 250,348 Z" fill="white" stroke="#1a1a1a" stroke-width="2"/>

</svg>
